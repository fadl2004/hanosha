<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

    <title>Dream Heart Tunnel</title>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink: #ff8dc7;
            --softPink: #ffc2de;
            --sky: #ffd6f6;
            --green: #7ed957;
            --carpet: #ff2e63;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            touch-action: none;
            background: linear-gradient(to bottom, #ffd6f6 0%, #ffc2de 30%, #d6f5ff 60%, #c7ffd8 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 15% 15%, rgba(255,255,255,.95) 0 60px, transparent 70px),
                radial-gradient(circle at 35% 10%, rgba(255,255,255,.9) 0 80px, transparent 90px),
                radial-gradient(circle at 65% 18%, rgba(255,255,255,.9) 0 70px, transparent 80px),
                radial-gradient(circle at 85% 12%, rgba(255,255,255,.95) 0 60px, transparent 70px);
            animation: cloudMove 25s linear infinite;
            z-index: -1;
            opacity: .8;
        }

        @keyframes cloudMove {
            from { transform: translateX(0); }
            to { transform: translateX(-150px); }
        }

        #introPage {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(to bottom, rgba(255,214,246,.95), rgba(255,194,222,.95));
            transition: opacity 1.5s ease;
        }

        .heart-scene {
            perspective: 1200px;
        }

        .heart-3d {
            width: 150px;
            height: 150px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateHeart 8s linear infinite, floatHeart 3s ease-in-out infinite;
        }

        .heart-3d::before,
        .heart-3d::after {
            content: "";
            position: absolute;
            width: 90px;
            height: 140px;
            background: linear-gradient(180deg, #ffb3d9, #ff2e63);
            border-radius: 90px 90px 0 0;
            box-shadow: 0 0 40px rgba(255,46,99,.5), inset 0 0 30px rgba(255,255,255,.4);
        }

        .heart-3d::before {
            left: 80px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-3d::after {
            left: 10px;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        @keyframes rotateHeart {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .enter-btn {
            margin-top: 50px;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff8dc7, #ff2e63);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,46,99,.4);
            transition: .3s;
        }

        .enter-btn:active {
            transform: scale(0.95);
        }

        .memory-label {
            position: fixed;
            left: 50%;
            bottom: 100px;
            transform: translateX(-50%);
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            z-index: 50;
            padding: 10px 25px;
            border-radius: 40px;
            background: rgba(255,46,99,.85);
            border: 2px solid rgba(255,255,255,.4);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(255,46,99,.5);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.5s ease;
            max-width: 90%;
            text-align: center;
        }

        .scroll-hint {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #ff2e63;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 30;
            pointer-events: none;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <!-- INTRO -->
    <div id="introPage">
        <div class="heart-scene">
            <div class="heart-3d"></div>
        </div>
        <button class="enter-btn" onclick="startExperience()">
            ادخل عالم الذكريات ✨
        </button>
    </div>

    <div class="memory-label" id="label-container"></div>

    <div class="scroll-hint">
        اسحب الشاشة أو استخدم السكرول للتحرك داخل الرحلة 👇
    </div>

    <!-- MUSIC -->
    <audio id="bgMusic" loop playsinline>
        <source src="ssstik.io_1778745070621.mp3" type="audio/mpeg">
    </audio>

    <script>
        const music = document.getElementById("bgMusic");

        /* VARIABLES */
        let scene, camera, renderer;
        let spotLight;
        let memoryGroups = [];
        let scrollY = 0;
        let currentTargetScroll = 0;
        const isMobile = window.innerWidth < 768;

        /* DATA */
        const memories = [
            
            { img: '1.jpg', text: 'حابب اقولك ان قلبك طيب وجميل' },
            { img: '2.jpeg', text: 'ضحكتك' },
            { img: '3.jpeg', text: 'أجمل وقت' },
            { img: '4.jpeg', text: 'يا خلاثي يا ناس' },
            { img: '5.jpeg', text: 'نينجا نينجا مفيش كلام 😂' },
            { img: '6.jpeg', text: 'اكيد حد كل اكلك  😂 😂' },
            { img: '7.jpeg', text: 'عليها باصة بتقول كلام كتير ' },
            { img: '8.jpeg', text: 'ونيجي للأخيرة ونقول القصة جنان  😂 😂' },
            { video: 'end.mp4', text: 'ونيجي للحضن الي بيقول كلام كتير ✨' }
        ];
        

        /* INIT */
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0xffd6f6, 0.018);

            /* CAMERA */
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 2, 10);

            /* RENDERER */
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            /* LIGHTS */
            const ambient = new THREE.AmbientLight(0xffffff, 2.5);
            scene.add(ambient);

            spotLight = new THREE.SpotLight(0xffffff, 4);
            spotLight.position.set(0, 20, 15);
            spotLight.angle = .45;
            spotLight.penumbra = 1;
            scene.add(spotLight);

            /* FLOOR */
            const floorGeo = new THREE.PlaneGeometry(100, 2000);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x7ed957, roughness: 1 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            /* RED CARPET */
            const carpetGeo = new THREE.PlaneGeometry(isMobile ? 4 : 7, 2000);
            const carpetMat = new THREE.MeshStandardMaterial({ color: 0xff2e63, emissive: 0xff2e63, emissiveIntensity: .4 });
            const carpet = new THREE.Mesh(carpetGeo, carpetMat);
            carpet.rotation.x = -Math.PI / 2;
            carpet.position.y = .02;
            scene.add(carpet);

            /* STARS */
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = isMobile ? 1200 : 2500;
            const positions = [];
            for (let i = 0; i < starsCount; i++) {
                positions.push((Math.random() - 0.5) * 300);
                positions.push(Math.random() * 120);
                positions.push((Math.random() - 0.5) * 2000);
            }
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const starsMaterial = new THREE.PointsMaterial({ size: .2, color: 0xffffff });
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            /* IMAGES + VIDEO PRODUCTION */
            memories.forEach((m, i) => {
                const group = new THREE.Group();
                let frame;

                /* VIDEO */
                if (m.video) {
                    const video = document.createElement('video');
                    video.src = m.video;
                    video.loop = true;
                    video.muted = true;
                    video.autoplay = true;
                    video.playsInline = true;
                    video.play().catch(e => console.log("Video block caught"));

                    const texture = new THREE.VideoTexture(video);
                    texture.colorSpace = THREE.SRGBColorSpace;

                    const vWidth = isMobile ? 6 : 11;
                    const vHeight = isMobile ? 3.4 : 6.2;
                    const frameGeo = new THREE.PlaneGeometry(vWidth, vHeight);
                    const frameMat = new THREE.MeshBasicMaterial({ map: texture });
                    frame = new THREE.Mesh(frameGeo, frameMat);
                    frame.position.set(0, isMobile ? 3.5 : 5, -i * 40);
                } 
                /* IMAGE (تم تعديل هذا الجزء لحل مشكلة عدم ظهور الصور محلياً) */
                else {
                    const imgElement = document.createElement('img');
                    imgElement.src = m.img;
                    
                    const texture = new THREE.Texture(imgElement);
                    imgElement.onload = function() {
                        texture.needsUpdate = true; // تحديث التكستشر فور تحميل الصورة
                    };

                    texture.colorSpace = THREE.SRGBColorSpace;

                    const imgWidth = isMobile ? 4 : 5.5;
                    const imgHeight = isMobile ? 5.5 : 7.5;
                    const frameGeo = new THREE.PlaneGeometry(imgWidth, imgHeight);
                    const frameMat = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                    frame = new THREE.Mesh(frameGeo, frameMat);

                    const side = isMobile ? (i % 2 === 0 ? 1.5 : -1.5) : (i % 2 === 0 ? 6 : -6);
                    frame.position.set(side, isMobile ? 3.5 : 4.5, -i * 40);
                    frame.rotation.y = i % 2 === 0 ? -0.15 : 0.15;
                }

                frame.castShadow = true;
                group.add(frame);

                /* GLOW */
                const glowWidth = isMobile ? (m.video ? 6.3 : 4.3) : (m.video ? 11.5 : 6);
                const glowHeight = isMobile ? (m.video ? 3.7 : 5.8) : (m.video ? 6.7 : 8);
                const glowGeo = new THREE.PlaneGeometry(glowWidth, glowHeight);
                const glowMat = new THREE.MeshBasicMaterial({ color: 0xff8dc7, transparent: true, opacity: 0.18 });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.copy(frame.position);
                glow.position.z -= 0.1;
                glow.rotation.copy(frame.rotation);
                group.add(glow);

                scene.add(group);

                memoryGroups.push({
                    mesh: frame,
                    group: group,
                    text: m.text,
                    z: -i * 40
                });
            });

            animate();
        }

        /* START EXPERIENCE */
        function startExperience() {
            const intro = document.getElementById('introPage');
            intro.style.opacity = '0';
            intro.style.pointerEvents = 'none';

            music.muted = false;
            music.play().catch(error => { console.log("Audio play failed:", error); });

            setTimeout(() => { intro.remove(); }, 1500);

            gsap.to(camera.position, {
                z: 5,
                duration: 3,
                ease: "power2.out"
            });
        }

        /* CONTROLS */
        window.addEventListener('wheel', (e) => {
            currentTargetScroll += e.deltaY * 0.02;
            currentTargetScroll = Math.max(0, Math.min(currentTargetScroll, memories.length * 40));
        });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            if(music.paused) { music.play(); }
        });

        window.addEventListener('touchmove', (e) => {
            let touchEndY = e.touches[0].clientY;
            let delta = touchStartY - touchEndY;
            currentTargetScroll += delta * 0.04;
            currentTargetScroll = Math.max(0, Math.min(currentTargetScroll, memories.length * 40));
            touchStartY = touchEndY;
        }, { passive: true });

        /* ANIMATION LOOP */
        function animate() {
            requestAnimationFrame(animate);

            scrollY += (currentTargetScroll - scrollY) * 0.05;
            camera.position.z = 10 - scrollY;
            camera.position.x = Math.sin(scrollY * 0.015) * 0.4;

            spotLight.position.x = Math.sin(Date.now() * 0.001) * 5;

            memoryGroups.forEach((m, i) => {
                m.mesh.position.y = (isMobile ? 3.5 : 4.5) + Math.sin(Date.now() * 0.001 + i) * 0.12;

                const dist = Math.abs(camera.position.z - (m.z + 5));

                if (dist < 22) {
                    const label = document.getElementById('label-container');
                    label.innerText = m.text;
                    label.style.opacity = Math.max(0, window.innerWidth < 768 ? (1 - dist / 12) : (1 - dist / 22));

                    gsap.to(m.mesh.scale, { x: 1.05, y: 1.05, duration: 0.5 });
                } else {
                    gsap.to(m.mesh.scale, { x: 1, y: 1, duration: 0.5 });
                }
            });

            renderer.render(scene, camera);
        }

        /* SCREEN RESIZE */
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
